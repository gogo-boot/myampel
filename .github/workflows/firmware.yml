name: Build Firmware

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'include/**'
      - 'platformio.ini'
      - 'partition/**'
  pull_request:
    paths:
      - 'src/**'
      - 'include/**'
      - 'platformio.ini'
      - 'partition/**'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pip
            ~/.platformio
          key: pio-${{ hashFiles('platformio.ini') }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install PlatformIO
        run: pip install platformio

      - name: Build debug
        run: pio run -e esp32-c3-debug

      - name: Build production
        run: pio run -e esp32-c3-production

      - uses: actions/upload-artifact@v4
        with:
          name: firmware
          path: |
            .pio/build/esp32-c3-production/firmware.bin
            .pio/build/esp32-c3-debug/firmware.bin
